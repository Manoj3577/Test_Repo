#thsi is the name of workflows which is dispay on action tab
name: cicd

#manual click to deliver work flow whennver user need
on:
  workflow_dispatch:
    inputs:
      enviroments:
        description: This is the enviroment values
        default: 'dev' 
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"
  build:  
    if:  inputs.enviroments=='dev'
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker contariner
        run: echo "Docker container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
        
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the ap
        run: echo " Docker compose deployed app"
    
